version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ratelimiter-postgres
    environment:
      POSTGRES_DB: ratelimiter
      POSTGRES_USER: ratelimiter
      POSTGRES_PASSWORD: ratelimiter_p@ssw0rd
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/postgres/init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimiter -d ratelimiter"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ratelimiter-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ratelimiter-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass redis_r@te_limiter
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_r@te_limiter", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - ratelimiter-net
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ratelimiter-gateway
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "redis_r@te_limiter"
      REDIS_DB: "0"
      POSTGRES_DSN: "host=postgres port=5432 user=ratelimiter password=ratelimiter_p@ssw0rd dbname=ratelimiter sslmode=disable"
      TARGET_URL: "http://httpbin:80"
      NODE_ID: "gateway-node-1"
      GIN_MODE: "release"
      TZ: Asia/Shanghai
    ports:
      - "8180:8080"
      - "9190:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./deployments/configs:/etc/ratelimiter:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ratelimiter-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    container_name: ratelimiter-admin-api
    environment:
      HTTP_ADDR: ":8081"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "redis_r@te_limiter"
      REDIS_DB: "0"
      POSTGRES_DSN: "host=postgres port=5432 user=ratelimiter password=ratelimiter_p@ssw0rd dbname=ratelimiter sslmode=disable"
      GIN_MODE: "release"
      TZ: Asia/Shanghai
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./deployments/configs:/etc/ratelimiter:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ratelimiter-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: ratelimiter-frontend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8090:80"
    depends_on:
      - admin-api
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ratelimiter-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  httpbin:
    image: kennethreitz/httpbin
    container_name: ratelimiter-httpbin-backend
    environment:
      TZ: Asia/Shanghai
    expose:
      - "80"
    networks:
      - ratelimiter-net
    restart: unless-stopped
    profiles:
      - demo

volumes:
  postgres_data:
    name: ratelimiter-postgres-data
  redis_data:
    name: ratelimiter-redis-data

networks:
  ratelimiter-net:
    name: ratelimiter-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
